name: Build AnimaVerse APK
on:
  push:
    branches:
      - main
    paths:
      - 'AnimaVerseMobile/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./AnimaVerseMobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install dependencies
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prebuild Expo
        run: npx expo prebuild --platform android --no-install

      - name: Build Android APK (Release Standalone)
        env:
          MYAPP_UPLOAD_STORE_FILE: my-release-key.keystore
          MYAPP_UPLOAD_KEY_ALIAS: my-key-alias
          MYAPP_UPLOAD_STORE_PASSWORD: password
          MYAPP_UPLOAD_KEY_PASSWORD: password
        run: |
          cd android/app
          keytool -genkey -v -keystore my-release-key.keystore -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=AnimaVerse, OU=AnimaVerse, O=AnimaVerse, L=City, S=State, C=US" -storepass password -keypass password
          cd ..
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AnimaVerse-App
          path: AnimaVerseMobile/android/app/build/outputs/apk/release/*.apk
